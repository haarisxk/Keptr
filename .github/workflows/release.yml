name: Build Keptr

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build desktop application
        run: npx tauri build

      - name: Locate build output
        if: always()
        shell: pwsh
        run: |
          Write-Host "Searching for executables and installers..."
          Get-ChildItem -Path . -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match 'release' } | ForEach-Object { Write-Host $_.FullName }

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: Keptr-Portable
          path: target/release/keptr.exe
          if-no-files-found: warn

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Keptr-Installer
          path: target/release/bundle/**/*
          if-no-files-found: warn
